<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayMax TV — Checkout</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Sora:wght@400;500;600;700&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060a;--bg2:#0d0d14;--bg3:#12121c;
  --accent:#00e87b;--accent-g:rgba(0,232,123,.12);
  --purple:#7c5cfc;--pink:#ff6b9d;
  --txt:#f0f0f5;--txt2:#8888a0;--txt3:#55556a;
  --border:rgba(255,255,255,.06);
  --grad:linear-gradient(135deg,#00e87b 0%,#7c5cfc 50%,#ff6b9d 100%);
  --r:16px;
}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}

.bg-fx{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(circle at 30% 30%,rgba(0,232,123,.03)0%,transparent 50%),
  radial-gradient(circle at 70% 70%,rgba(124,92,252,.03)0%,transparent 50%)}

.page{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

/* BACK LINK */
.back{display:inline-flex;align-items:center;gap:8px;color:var(--txt2);text-decoration:none;font-size:.9rem;font-weight:500;margin-bottom:32px;transition:color .3s;align-self:flex-start;max-width:520px;width:100%}
.back:hover{color:var(--txt)}

/* CHECKOUT CARD */
.checkout{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);width:100%;max-width:520px;overflow:hidden;animation:fadeUp .6s ease}

.checkout-header{padding:32px 32px 0;text-align:center}
.checkout-header .logo{font-family:'Sora',sans-serif;font-weight:700;font-size:1.3rem;margin-bottom:24px}
.checkout-header .logo em{font-style:normal;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* PLAN SUMMARY */
.plan-box{margin:0 32px;padding:20px;background:rgba(0,232,123,.04);border:1px solid rgba(0,232,123,.15);border-radius:12px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.plan-box .info h3{font-size:1.1rem;font-weight:700;margin-bottom:2px}
.plan-box .info span{font-size:.82rem;color:var(--txt2)}
.plan-box .val{font-family:'Sora',sans-serif;font-size:1.8rem;font-weight:700;color:var(--accent);white-space:nowrap}
.plan-box .val small{font-size:.75rem;color:var(--txt2);font-weight:400}

/* FEATURES MINI */
.feat-mini{margin:20px 32px 0;display:flex;flex-wrap:wrap;gap:8px}
.feat-mini span{padding:6px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:100px;font-size:.78rem;color:var(--txt2);font-weight:500}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:28px 32px}

/* PIX SECTION */
.pix-section{padding:0 32px;text-align:center}
.pix-title{font-size:1rem;font-weight:600;margin-bottom:4px}
.pix-sub{font-size:.85rem;color:var(--txt2);margin-bottom:24px}

.qr-container{display:inline-block;background:#fff;padding:16px;border-radius:12px;margin-bottom:20px;position:relative}
.qr-container canvas{display:block!important}

/* COPY KEY */
.copy-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:12px}
.copy-row .key{flex:1;font-size:.88rem;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left}
.copy-row .key strong{color:var(--txt);font-weight:600;display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.copy-btn{padding:10px 20px;background:var(--accent);color:#000;font-weight:600;font-size:.82rem;border-radius:100px;border:none;cursor:pointer;font-family:inherit;transition:all .3s;white-space:nowrap}
.copy-btn:hover{box-shadow:0 4px 16px rgba(0,232,123,.3)}
.copy-btn.copied{background:#7c5cfc;color:#fff}

/* TIMER */
.timer-row{display:flex;align-items:center;justify-content:center;gap:8px;margin:16px 0 0;padding:12px;background:rgba(255,107,157,.06);border:1px solid rgba(255,107,157,.15);border-radius:10px}
.timer-row .dot{width:8px;height:8px;border-radius:50%;background:#ff6b9d;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.timer-row span{font-size:.85rem;color:#ff6b9d;font-weight:500}

/* ACTIONS */
.actions{padding:28px 32px 32px;display:flex;flex-direction:column;gap:10px}

.btn-wa{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px;background:#25d366;color:#fff;font-weight:700;font-size:1rem;border-radius:100px;text-decoration:none;transition:all .3s;border:none;cursor:pointer;font-family:inherit;width:100%}
.btn-wa:hover{box-shadow:0 8px 28px rgba(37,211,102,.3);transform:translateY(-1px)}

.btn-secondary{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:rgba(255,255,255,.04);color:var(--txt2);font-weight:500;font-size:.88rem;border-radius:100px;text-decoration:none;transition:all .3s;border:1px solid var(--border)}
.btn-secondary:hover{background:rgba(255,255,255,.07);color:var(--txt)}

/* SECURE BADGE */
.secure{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;font-size:.75rem;color:var(--txt3)}

/* STEPS INDICATOR */
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:28px}
.step{display:flex;align-items:center;gap:8px;font-size:.8rem;font-weight:500}
.step .num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700}
.step.active .num{background:var(--accent);color:#000}
.step.done .num{background:rgba(0,232,123,.15);color:var(--accent)}
.step.pending .num{background:rgba(255,255,255,.05);color:var(--txt3)}
.step.active span{color:var(--txt)}
.step.done span{color:var(--accent)}
.step.pending span{color:var(--txt3)}
.step-line{width:40px;height:1px;background:var(--border);margin:0 4px}

/* NO PLAN */
.no-plan{text-align:center;padding:60px 32px}
.no-plan h2{font-family:'Sora',sans-serif;font-size:1.4rem;margin-bottom:12px}
.no-plan p{color:var(--txt2);margin-bottom:28px;font-size:.95rem}
.no-plan a{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:var(--accent);color:#000;font-weight:600;border-radius:100px;text-decoration:none;transition:all .3s}
.no-plan a:hover{box-shadow:0 8px 28px rgba(0,232,123,.3)}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:540px){
  .plan-box{flex-direction:column;text-align:center}
  .copy-row{flex-direction:column;text-align:center}
  .step-line{width:20px}
}
</style>
</head>
<body>
<div class="bg-fx"></div>

<div class="page">
  <a href="playmax-tv-landing.html" class="back">← Voltar aos planos</a>

  <div class="checkout" id="checkout">
    <!-- Content injected by JS -->
  </div>
</div>

<script>
// ====== CONFIG ======
const PIX_KEY = 'rcaires90@gmail.com';
const PIX_NAME = 'PLAYMAX TV';
const PIX_CITY = 'SAO PAULO';
const WHATSAPP = '5511914164272';

const PLANS = {
  basico: {
    name: 'Básico',
    price: 59.90,
    screens: '1 tela',
    features: ['Canais ao vivo', 'Canais 24H', 'Suporte WhatsApp'],
  },
  premium: {
    name: 'Premium',
    price: 89.90,
    screens: '2 telas',
    features: ['Todos os canais', 'Filmes & Séries', 'Novelas', 'Suporte prioritário'],
    popular: true,
  },
  familia: {
    name: 'Família',
    price: 119.90,
    screens: '3 telas',
    features: ['Tudo do Premium', 'Conteúdo adulto', 'Suporte VIP 24h'],
  }
};

// ====== PIX BR CODE GENERATOR ======
function pixBRCode(key, name, city, amount, txid = '***') {
  const f = (id, val) => id + String(val.length).padStart(2, '0') + val;

  // Merchant Account Information (Pix)
  const gui = f('00', 'br.gov.bcb.pix');
  const chave = f('01', key);
  const mai = f('26', gui + chave);

  // Build payload without CRC
  let payload = '';
  payload += f('00', '01');                         // Payload Format
  payload += mai;                                    // Merchant Account
  payload += f('52', '0000');                        // MCC
  payload += f('53', '986');                         // Currency (BRL)
  payload += f('54', amount.toFixed(2));             // Amount
  payload += f('58', 'BR');                          // Country
  payload += f('59', name.substring(0, 25));         // Merchant Name
  payload += f('60', city.substring(0, 15));         // City
  payload += f('62', f('05', txid));                 // Additional Data
  payload += '6304';                                 // CRC placeholder

  // CRC16-CCITT
  let crc = 0xFFFF;
  for (let i = 0; i < payload.length; i++) {
    crc ^= payload.charCodeAt(i) << 8;
    for (let j = 0; j < 8; j++) {
      crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : crc << 1;
      crc &= 0xFFFF;
    }
  }
  return payload + crc.toString(16).toUpperCase().padStart(4, '0');
}

// ====== RENDER ======
function render() {
  const params = new URLSearchParams(window.location.search);
  const planKey = params.get('plano');
  const container = document.getElementById('checkout');

  if (!planKey || !PLANS[planKey]) {
    container.innerHTML = `
      <div class="no-plan">
        <h2>Nenhum plano selecionado</h2>
        <p>Volte e escolha o plano ideal pra você.</p>
        <a href="playmax-tv-landing.html">Ver Planos</a>
      </div>`;
    return;
  }

  const plan = PLANS[planKey];
  const brcode = pixBRCode(PIX_KEY, PIX_NAME, PIX_CITY, plan.price);
  const priceFormatted = plan.price.toFixed(2).replace('.', ',');

  const featTags = plan.features.map(f => `<span>${f}</span>`).join('');

  const waMsg = encodeURIComponent(
    `Olá! Acabei de fazer o Pix de R$${priceFormatted} para o plano ${plan.name} (${plan.screens}) da PlayMax TV. Pode ativar minha lista?`
  );

  container.innerHTML = `
    <div class="checkout-header">
      <div class="logo"><em>PlayMax</em> TV</div>
      <div class="steps">
        <div class="step done"><span class="num">✓</span><span>Plano</span></div>
        <div class="step-line"></div>
        <div class="step active"><span class="num">2</span><span>Pagamento</span></div>
        <div class="step-line"></div>
        <div class="step pending"><span class="num">3</span><span>Ativação</span></div>
      </div>
    </div>

    <div class="plan-box">
      <div class="info">
        <h3>Plano ${plan.name}</h3>
        <span>${plan.screens} simultânea${plan.screens !== '1 tela' ? 's' : ''} • Mensal</span>
      </div>
      <div class="val">R$${priceFormatted}<small>/mês</small></div>
    </div>

    <div class="feat-mini">${featTags}</div>

    <div class="divider"></div>

    <div class="pix-section">
      <div class="pix-title">Escaneie o QR Code com seu banco</div>
      <div class="pix-sub">O pagamento é confirmado na hora via Pix</div>

      <div class="qr-container" id="qrcode"></div>

      <div class="copy-row">
        <div class="key">
          <strong>Pix Copia e Cola</strong>
          <span id="pixcode">${brcode}</span>
        </div>
        <button class="copy-btn" onclick="copyPix(this)">Copiar</button>
      </div>

      <div class="copy-row">
        <div class="key">
          <strong>Chave Pix (E-mail)</strong>
          <span>${PIX_KEY}</span>
        </div>
        <button class="copy-btn" onclick="copyKey(this)">Copiar</button>
      </div>

      <div class="timer-row">
        <span class="dot"></span>
        <span>Aguardando pagamento — <strong id="timer">15:00</strong></span>
      </div>
    </div>

    <div class="actions">
      <a href="https://wa.me/${WHATSAPP}?text=${waMsg}" class="btn-wa" target="_blank">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 00.612.638l4.685-1.248A11.944 11.944 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.24 0-4.326-.694-6.044-1.878l-.344-.238-3.522.938.774-3.375-.256-.368A9.96 9.96 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
        Já paguei — Ativar minha lista
      </a>
      <a href="playmax-tv-landing.html" class="btn-secondary">← Trocar de plano</a>
      <div class="secure">🔒 Pagamento seguro via Pix • Banco Central do Brasil</div>
    </div>
  `;

  // Generate QR Code
  new QRCode(document.getElementById('qrcode'), {
    text: brcode,
    width: 220,
    height: 220,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M,
  });

  // Remove duplicate image (qrcode.js creates both canvas and img)
  const qrImg = document.querySelector('#qrcode img');
  if (qrImg) qrImg.style.display = 'none';

  // Countdown timer
  startTimer(15 * 60);
}

// ====== COPY FUNCTIONS ======
function copyPix(btn) {
  const code = document.getElementById('pixcode').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2500);
  });
}

function copyKey(btn) {
  navigator.clipboard.writeText(PIX_KEY).then(() => {
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2500);
  });
}

// ====== TIMER ======
function startTimer(seconds) {
  const el = document.getElementById('timer');
  if (!el) return;
  const tick = () => {
    if (seconds <= 0) { el.textContent = '00:00'; return; }
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    seconds--;
    setTimeout(tick, 1000);
  };
  tick();
}

// ====== INIT ======
render();
</script>
</body>
</html>
